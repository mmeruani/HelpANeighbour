name: help_a_neighbour
description: Cross-platform mobile application for community-based service exchange

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  google_fonts: ^6.3.0
  http: ^1.6.0
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
